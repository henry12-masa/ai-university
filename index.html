<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI大学受験クイズ</title>
<meta name="description" content="共通テスト・東大・京大・慶應・早稲田・MARCH・関関同立レベルの大学受験対策クイズ。各カテゴリ200問から50問ランダム出題。">
<link rel="stylesheet" href="style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
</head>
<body>
<header>
  <h1 id="pageTitle">AI大学受験クイズ</h1>
  <p id="pageDesc">各カテゴリ200問から50問ランダム出題。間違えた問題だけ復習・苦手分析つき。</p>
</header>

<nav class="top-actions">
  <a href="index.html" id="homeLink">トップ</a>
  <button id="reviewBtn" type="button">間違えた問題だけ復習</button>
  <button id="clearHistoryBtn" type="button">学習履歴リセット</button>
</nav>

<section id="categoryArea" class="category-area"></section>

<main class="layout">
  <aside class="ad-box left-ad">
    <p class="ad-label">スポンサーリンク</p>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="6325875393" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </aside>

  <section class="quiz-box">
    <div class="status">
      <span id="counter">0 / 0</span>
      <span id="score">スコア: 0</span>
    </div>
    <div class="progress"><div id="progressBar"></div></div>
    <div id="modeLabel" class="mode-label"></div>
    <h2 id="question">カテゴリを選んでください</h2>
    <div id="meta"></div>
    <div id="choices"></div>
    <p id="result"></p>
    <button id="nextBtn" type="button">次の問題</button>
    <section id="analysisBox" class="analysis-box"></section>
  </section>

  <aside class="ad-box right-ad">
    <p class="ad-label">スポンサーリンク</p>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="6325875393" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </aside>
</main>

<script src="data/university-data.js"></script>
<script src="script.js"></script>
</body>
</html>
